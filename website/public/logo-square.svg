<svg viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Centered logo in square canvas, scaled ~4.5x, offset to center -->
  <g transform="translate(20, 38) scale(4.5)">
    <!-- A — left diagonal leg -->
    <path d="M3 37L17 3" stroke="#fafafa" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Shared vertical — A right side + K spine -->
    <path d="M17 3V37" stroke="#fafafa" stroke-width="2.5" stroke-linecap="round"/>
    <!-- A — crossbar -->
    <path d="M9 24H17" stroke="#fafafa" stroke-width="2" stroke-linecap="round"/>
    <!-- K — upper arm -->
    <path d="M17 24L36 3" stroke="#fafafa" stroke-width="2.5" stroke-linecap="round"/>
    <!-- K — lower leg -->
    <path d="M17 24L38 37" stroke="#fafafa" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Accent dot -->
    <circle cx="43" cy="37" r="2.5" fill="url(#logo-gradient-sq)"/>
  </g>
  <defs>
    <linearGradient id="logo-gradient-sq" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
  </defs>
</svg>
